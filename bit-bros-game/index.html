<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bit Bros — Platformer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-wrap">
  <div id="hud">
    <div class="hud-item">SCORE <span id="hud-score">0</span></div>
    <div class="hud-item">COINS <span id="hud-coins">0</span></div>
    <div class="hud-item">VIDAS <span id="hud-lives">3</span></div>
    <div class="hud-item">NIVEL <span id="hud-level">1-1</span></div>
    <div class="hud-item">TIEMPO <span id="hud-time">400</span></div>
  </div>

  <canvas id="game" width="800" height="480"></canvas>

  <div id="overlay" class="overlay hidden">
    <div class="overlay-box">
      <h1 id="overlay-title">BIT BROS</h1>
      <p id="overlay-msg">Un platformer estilo retro. Corré, saltá, pisá enemigos y llegá a la bandera.</p>
      <div id="overlay-controls">
        <span>⟵ ⟶ / A D : mover</span>
        <span>ESPACIO / ↑ / W : saltar</span>
        <span>R : reiniciar</span>
      </div>
      <button id="overlay-btn">JUGAR</button>
    </div>
  </div>

  <div id="touch-controls">
    <div class="touch-side">
      <button id="btn-left" class="touch-btn">◀</button>
      <button id="btn-right" class="touch-btn">▶</button>
    </div>
    <button id="btn-jump" class="touch-btn touch-jump">⤒</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
